# Build and publish the dfir (forensic workstation) image to GitHub Container
# Registry (GHCR). Students then `git clone` + `make start` and Docker PULLS the
# prebuilt image — no local build, no toolchain, no AppleDouble context issues.
#
# Multi-arch (amd64 + arm64) so it runs natively on:
#   - Apple Silicon Macs (arm64)
#   - Intel Macs, Windows/WSL2, Linux (amd64)
#
# FIRST-TIME SETUP (one manual step, repo owner only):
#   After the first successful run, the package is created as PRIVATE. Go to:
#     https://github.com/users/michael-borck/packages/container/dfir-cli/settings
#   (or the org equivalent) and change "Danger Zone → Change visibility" to
#   PUBLIC, so anonymous students can `docker pull` without authenticating.
name: Build & Publish DFIR Image

on:
  push:
    branches: [main]
    paths:
      - 'images/dfir-cli/**'
      - 'scripts/coc-log'
      - '.github/workflows/docker.yml'
  workflow_dispatch: {}      # manual "Run workflow" button
  schedule:
    - cron: '17 4 * * 1'     # weekly rebuild to refresh the Debian base (Mon 04:17 UTC)

# Cancel superseded runs on the same ref
concurrency:
  group: dfir-image-${{ github.ref }}
  cancel-in-progress: true

env:
  # GHCR requires lowercase; michael-borck is already lowercase.
  IMAGE: ghcr.io/${{ github.repository_owner }}/dfir-cli

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # QEMU lets an amd64 runner build the arm64 variant via emulation.
      # (If builds are slow, swap `ubuntu-latest` for a per-arch matrix using
      #  GitHub's native `ubuntu-24.04-arm` runner instead of QEMU.)
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no secret config needed

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/dfir-cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "### DFIR image published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull $IMAGE:latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Students just run \`make start\` (or \`docker compose run --rm dfir\`) and it is pulled automatically." >> "$GITHUB_STEP_SUMMARY"
